    <!-- SPA 404 URL Restoration Script -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === 'p') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).filter(function(s) {
            return s.slice(0, 2) === 'p=';
          })[0];
          if (decoded) {
            var path = decodeURIComponent(decoded.slice(2));
            var repoSubpath = l.pathname.endsWith('/') ? l.pathname.slice(0, -1) : l.pathname;
            window.history.replaceState(null, null,
              repoSubpath + (path ? '/' + path : '') + l.hash
            );
          }
        }
      }(window.location));
    </script>
  </head>
  <body class="bg-surface-light dark:bg-surface-dark text-neutral-900 dark:text-neutral-100 font-sans antialiased min-h-screen selection:bg-accent selection:text-white transition-colors duration-200">

    <script type="module" src="/src/main.tsx"></script>
  </body>
